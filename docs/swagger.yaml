openapi: 3.0.0
info:
  title: Kanban Board API
  version: 1.0.0
  description: A RESTful API for managing a Kanban board

servers:
  - url: http://localhost:4000
    description: Development server

tags:
  - name: Columns
    description: Column management and retrieval operations
  - name: Tasks
    description: Task management and retrieval operations

components:
  schemas:
    Column:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the column
        title:
          type: string
          description: The title of the column
        order:
          type: integer
          description: The order position of the column
        taskCount:
          type: integer
          description: The number of tasks in the column
        createdAt:
          type: string
          format: date-time
          description: The timestamp when the column was created
        updatedAt:
          type: string
          format: date-time
          description: The timestamp when the column was last updated
      example:
        id: "5ebac534954b54139806c112"
        title: "To Do"
        order: 1
        taskCount: 5
        createdAt: "2020-05-12T16:18:04.793Z"
        updatedAt: "2020-05-12T16:18:04.793Z"
    
    Task:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the task
        title:
          type: string
          description: The title of the task
        description:
          type: string
          description: Detailed description of the task
        columnId:
          type: string
          description: The ID of the column this task belongs to
        order:
          type: integer
          description: The order position of the task within its column
        column:
          type: object
          properties:
            title:
              type: string
              description: The title of the column this task belongs to
        createdAt:
          type: string
          format: date-time
          description: The timestamp when the task was created
        updatedAt:
          type: string
          format: date-time
          description: The timestamp when the task was last updated
      example:
        id: "5ebac534954b54139806c112"
        title: "Implement login"
        description: "Add login functionality with JWT"
        columnId: "5ebac534954b54139806c112"
        order: 1
        column:
          title: "To Do"
        createdAt: "2020-05-12T16:18:04.793Z"
        updatedAt: "2020-05-12T16:18:04.793Z"

paths:
  /api/columns:
    get:
      tags:
        - Columns
      summary: Get all columns
      description: Retrieve all columns with pagination.
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
          description: Maximum number of columns
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Column'
                  pagination:
                    type: object
                    properties:
                      currentPage:
                        type: integer
                      totalPages:
                        type: integer
                      totalItems:
                        type: integer
                      itemsPerPage:
                        type: integer
    post:
      tags:
        - Columns
      summary: Create a column
      description: Create a new column.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 100
                order:
                  type: integer
                  minimum: 0
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Column'

  /api/columns/{id}:
    put:
      tags:
        - Columns
      summary: Update a column
      description: Update column details.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Column id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 100
                order:
                  type: integer
                  minimum: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Column'
    delete:
      tags:
        - Columns
      summary: Delete a column
      description: Delete a column and its associated tasks.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Column id
      responses:
        "204":
          description: No content

  /api/tasks:
    get:
      tags:
        - Tasks
      summary: Get all tasks
      description: Retrieve all tasks with pagination.
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
          description: Maximum number of tasks
        - in: query
          name: columnId
          schema:
            type: string
          description: Column id to filter tasks
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
                  pagination:
                    type: object
                    properties:
                      currentPage:
                        type: integer
                      totalPages:
                        type: integer
                      totalItems:
                        type: integer
                      itemsPerPage:
                        type: integer
    post:
      tags:
        - Tasks
      summary: Create a task
      description: Create a new task.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - columnId
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 200
                description:
                  type: string
                  maxLength: 1000
                columnId:
                  type: string
                order:
                  type: integer
                  minimum: 0
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'

  /api/tasks/column/{columnId}:
    get:
      tags:
        - Tasks
      summary: Get tasks by column
      description: Retrieve tasks for a specific column.
      parameters:
        - in: path
          name: columnId
          required: true
          schema:
            type: string
          description: Column id
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
          description: Maximum number of tasks
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
                  pagination:
                    type: object
                    properties:
                      currentPage:
                        type: integer
                      totalPages:
                        type: integer
                      totalItems:
                        type: integer
                      itemsPerPage:
                        type: integer

  /api/tasks/{id}:
    put:
      tags:
        - Tasks
      summary: Update a task
      description: Update task details.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Task id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 200
                description:
                  type: string
                  maxLength: 1000
                columnId:
                  type: string
                order:
                  type: integer
                  minimum: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
    delete:
      tags:
        - Tasks
      summary: Delete a task
      description: Delete a task.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Task id
      responses:
        "204":
          description: No content

  /api/tasks/{id}/move:
    put:
      tags:
        - Tasks
      summary: Move a task
      description: Move a task to a different column and/or position.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Task id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - targetColumnId
                - order
              properties:
                targetColumnId:
                  type: string
                order:
                  type: integer
                  minimum: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task' 