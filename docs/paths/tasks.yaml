/api/tasks:
  get:
    tags:
      - Tasks
    summary: Get all tasks
    description: Retrieve all tasks with pagination.
    parameters:
      - in: query
        name: page
        schema:
          type: integer
          minimum: 1
        description: Page number
      - in: query
        name: limit
        schema:
          type: integer
          minimum: 1
          maximum: 100
        description: Maximum number of tasks
      - in: query
        name: columnId
        schema:
          type: string
        description: Column id to filter tasks
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../schemas/task.yaml#/Task'
                pagination:
                  type: object
                  properties:
                    currentPage:
                      type: integer
                    totalPages:
                      type: integer
                    totalItems:
                      type: integer
                    itemsPerPage:
                      type: integer

  post:
    tags:
      - Tasks
    summary: Create a task
    description: Create a new task.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - title
              - columnId
            properties:
              title:
                type: string
                minLength: 1
                maxLength: 200
              description:
                type: string
                maxLength: 1000
              columnId:
                type: string
              order:
                type: integer
                minimum: 0
    responses:
      "201":
        description: Created
        content:
          application/json:
            schema:
              $ref: '../schemas/task.yaml#/Task'

/api/tasks/column/{columnId}:
  get:
    tags:
      - Tasks
    summary: Get tasks by column
    description: Retrieve tasks for a specific column.
    parameters:
      - in: path
        name: columnId
        required: true
        schema:
          type: string
        description: Column id
      - in: query
        name: page
        schema:
          type: integer
          minimum: 1
        description: Page number
      - in: query
        name: limit
        schema:
          type: integer
          minimum: 1
          maximum: 100
        description: Maximum number of tasks
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../schemas/task.yaml#/Task'
                pagination:
                  type: object
                  properties:
                    currentPage:
                      type: integer
                    totalPages:
                      type: integer
                    totalItems:
                      type: integer
                    itemsPerPage:
                      type: integer

/api/tasks/{id}:
  put:
    tags:
      - Tasks
    summary: Update a task
    description: Update task details.
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: Task id
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              title:
                type: string
                minLength: 1
                maxLength: 200
              description:
                type: string
                maxLength: 1000
              columnId:
                type: string
              order:
                type: integer
                minimum: 0
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema:
              $ref: '../schemas/task.yaml#/Task'

  delete:
    tags:
      - Tasks
    summary: Delete a task
    description: Delete a task.
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: Task id
    responses:
      "204":
        description: No content

/api/tasks/{id}/move:
  put:
    tags:
      - Tasks
    summary: Move a task
    description: Move a task to a different column and/or position.
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: Task id
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - targetColumnId
              - order
            properties:
              targetColumnId:
                type: string
              order:
                type: integer
                minimum: 0
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema:
              $ref: '../schemas/task.yaml#/Task' 